<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CourtHub Owner Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#22C55E", // Vibrant green from the logo/button
              "background-light": "#FFFFFF",
              "background-dark": "#0F172A",
              "brand-dark": "#064E3B", // Darker green for the top section
            },
            fontFamily: {
              display: ["Plus Jakarta Sans", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "12px",
            },
          },
        },
      };
    </script>
<style>body {
    font-family: "Plus Jakarta Sans", sans-serif
    }
.grid-pattern {
    background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px);
    background-size: 20px 20px
    }
.dark .grid-pattern {
    background-image: radial-gradient(circle, #334155 1px, transparent 1px)
    }
.sports-pattern {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuChbsHoA-l1FaCVC52TVLXr5B8R-wERfmCZJdvog_4duD2n2b8HFBrndIBv9aXC4YtW9NOn3RvMtzobmJnshhRn64noQeCX9Hh4FtoaelXYPVzYJcugkHSo9IuZgIIWZNx5iEHbWrYL_Qm30akDMRX00fe5X83khgf6MYCoUmwkVy5KmZAnhIZCO0HopHVwZz2RFgB-6cxy82ez1PTXO_2quqrpxPRn1UfJJQ8Y39fzK_41RU2ikdC6DkpX_qQVxXRmBbbXzrk4AqC-);
    opacity: 0.05
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<div class="relative bg-brand-dark overflow-hidden h-[42vh] flex flex-col items-center justify-center px-6 text-center">
<div class="absolute inset-0 sports-pattern"></div>
<div class="absolute top-10 left-10 w-20 h-20 bg-white/5 rounded-full"></div>
<div class="absolute bottom-20 right-10 w-32 h-32 bg-white/5 rounded-full"></div>
<div class="absolute top-1/2 left-1/4 w-12 h-12 bg-white/5 rounded-full"></div>
<div class="relative z-10 flex flex-col items-center">
<div class="flex items-center space-x-2 mb-6">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-2xl">sports_tennis</span>
</div>
<h1 class="text-2xl font-extrabold text-white tracking-tight">Court<span class="text-primary">Hub</span></h1>
</div>
<div class="inline-flex items-center bg-white/10 px-4 py-1 rounded-full border border-white/20 mb-6">
<div class="w-2 h-2 bg-primary rounded-full animate-pulse mr-2"></div>
<span class="text-[10px] font-bold text-white uppercase tracking-widest">Join Today</span>
</div>
<h2 class="text-4xl md:text-5xl font-black text-white leading-tight mb-4 tracking-tight italic uppercase">
                Your Game,<br/>
<span class="text-primary">Your Court.</span>
</h2>
<p class="text-white/70 text-sm max-w-[280px] leading-relaxed">
                List your sports facilities and reach thousands of players looking for their next game.
            </p>
</div>
</div>
<div class="relative flex-1 bg-background-light dark:bg-background-dark rounded-t-[40px] -mt-10 z-20 shadow-2xl px-8 pt-10 pb-12 grid-pattern">
<div class="flex justify-center space-x-2 mb-8">
<div class="h-1.5 w-8 bg-primary rounded-full"></div>
<div class="h-1.5 w-8 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
<div class="text-center mb-8">
<h3 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tight italic">Create Account</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Join CourtHub and start managing your venues</p>
</div>
<form class="space-y-5 max-w-md mx-auto">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">First Name</label>
<input class="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-primary rounded-2xl text-slate-900 dark:text-white placeholder-slate-400 transition-all text-sm" placeholder="John" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Last Name</label>
<input class="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-primary rounded-2xl text-slate-900 dark:text-white placeholder-slate-400 transition-all text-sm" placeholder="Doe" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Email</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-slate-100 dark:bg-slate-800/50 border-transparent focus:border-primary focus:ring-primary rounded-2xl text-slate-900 dark:text-white placeholder-slate-400 transition-all text-sm" placeholder="aadil2raja@gmail.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Phone (Optional)</label>
<input class="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-primary rounded-2xl text-slate-900 dark:text-white placeholder-slate-400 transition-all text-sm" placeholder="+1 234 567 8900" type="tel"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Password</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-slate-100 dark:bg-slate-800/50 border-transparent focus:border-primary focus:ring-primary rounded-2xl text-slate-900 dark:text-white placeholder-slate-400 transition-all text-sm" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-green-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-green-500/20 flex items-center justify-center space-x-2 transition-all transform active:scale-[0.98] mt-4" type="submit">
<span class="text-base">Continue</span>
<span class="material-symbols-outlined text-xl">arrow_right_alt</span>
</button>
</form>
<div class="text-center mt-8">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Sign in</a>
</p>
</div>
</div>

</body></html>
